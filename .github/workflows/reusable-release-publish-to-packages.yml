on:
    workflow_call:
        inputs:
            version:
                required: true
                type: string

jobs:
    publish-to-github-packages:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '24'

            - name: Login to nexus registry with username and password
              run: npm login --registry https://nexus.d0kima.com/repository/npm-registry --scope=@d0kima --always-auth --username ${{ secrets.NEXUS_USERNAME }} --password ${{ secrets.NEXUS_PASSWORD }}
                  

            - name: Publish to GitHub Packages
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    publish-release:
        needs: publish-to-github-packages
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Mark existing release as stable
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = `${{ inputs.version }}`;
                      const { owner, repo } = context.repo;

                      const { data: release } = await github.rest.repos.getReleaseByTag({
                          owner,
                          repo,
                          tag,
                      });

                      await github.rest.repos.updateRelease({
                          owner,
                          repo,
                          release_id: release.id,
                          prerelease: false,
                      });