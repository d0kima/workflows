name: Build and Push Docker Image
description: Build and push a Docker image to Nexus

inputs:
  image-version:
    description: 'The version tag for the Docker image'
    required: true
    default: 'latest'
  repository-name:
    description: 'The name of the Nexus repository'
    required: true
    default: 'my-repository'
  repository-url:
    description: 'The Nexus repository URL'
    required: true
    default: 'https://nexus.example.com'
  repository-username:
    description: 'The Nexus repository username'
    required: true
    default: 'username'
  repository-password:
    description: 'The Nexus repository password'
    required: true
    default: 'password'
runs:
  using: "composite"
  steps:
    - name: Login to Nexus
      uses: docker/login-action@v2
      with:
        registry: ${{ inputs.repository-url }}
        username: ${{ inputs.repository-username }}
        password: ${{ inputs.repository-password }}
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: ${{ inputs.repository-url }}/${{ inputs.repository-name }}:${{ inputs.image-version }}